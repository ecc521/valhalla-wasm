# Fully-pinned toolchain for reproducible builds. The committed prebuilt artifacts
# (valhalla.js / valhalla.wasm) are the output of these exact references.
# compile_wasm.sh reads VALHALLA_REF and VCPKG_REF; the Dockerfile reads EMSDK_VERSION.

VALHALLA_REF=f7764b337de93530374ac90978f638734139d93b
VCPKG_REF=89dd0f4d241136b843fb55813b2f0fa6448c204d

# Emscripten SDK, pinned to a concrete release. emsdk versions are immutable, so
# this resolves to the same toolchain (LLVM/wasm-binaries) on every build. Override
# with: docker build --build-arg EMSDK_VERSION=<version> .
EMSDK_VERSION=6.0.0
